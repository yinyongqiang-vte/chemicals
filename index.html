<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实验室安全：智能分类考核系统</title>
    <style>
        :root { 
            --primary-color: #2c3e50; --bg-color: #f4f7f6; --danger-color: #e74c3c; 
            --success-color: #27ae60; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .header { 
            background-color: var(--primary-color); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; 
        }
        .question-stage { 
            padding: 20px; background: #fff; border-bottom: 2px solid #ddd; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 160px; position: relative;
        }
        .current-item {
            background-color: #fff; border: 3px solid var(--primary-color); border-radius: 15px;
            padding: 15px 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 85%;
            transition: transform 0.2s;
        }
        .item-icon { font-size: 42px; margin-bottom: 8px; }
        .item-name { font-size: 20px; font-weight: bold; color: #34495e; }
        .item-hint { font-size: 13px; color: #95a5a6; margin-top: 6px; }
        .timer-bar-container { width: 85%; height: 6px; background-color: #eee; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background-color: var(--success-color); transition: width 0.1s linear; }
        .cabinets-container { 
            flex: 1; padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
            overflow-y: auto; padding-bottom: 40px; 
        }
        .cabinet { 
            border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; 
            border: 2px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 85px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cabinet:active { transform: scale(0.94); filter: brightness(0.9); }
        .cabinet-label { font-size: 14px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 88%; max-width: 340px; text-align: center; }
        .btn { padding: 14px 20px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 12px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-share { background-color: var(--success-color); color: white; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(44, 62, 80, 0.95); color: #fff; padding: 15px 30px; border-radius: 10px; display: none; z-index: 2000; text-align: center; font-weight: bold; }
        
        .advice-panel { margin-top:15px; padding:12px; border-radius:8px; font-size:13px; text-align:left; line-height:1.5; }
        .advice-warning { background:#fff3cd; color:#856404; border: 1px solid #ffeeba; }
        .advice-success { background:#d4edda; color:#155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="header">
        <div>得分: <span id="score" style="color:#f1c40f">0</span></div>
        <div>进度: <span id="progress">0/20</span></div>
        <div>容错: <span id="lives">❤️❤️</span></div>
    </div>
    
    <div class="question-stage" id="stage">
        <div class="current-item" id="current-item">
            <div class="item-icon" id="item-icon">📦</div>
            <div class="item-name" id="item-name">载入中...</div>
            <div class="item-hint" id="item-hint">正在配置题库</div>
        </div>
        <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
    </div>

    <div class="cabinets-container" id="cabinets"></div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">提示</h3>
            <div id="modal-body" style="font-size:14px; line-height:1.6; margin-bottom:20px; text-align: left; color:#34495e;"></div>
            <button class="btn btn-primary" id="modal-btn" onclick="closeModal()">知晓并继续</button>
            <button class="btn btn-share" id="share-btn" style="display:none;" onclick="shareResult()">复制包含建议的战报</button>
        </div>
    </div>

    <div class="toast" id="toast">提示</div>

<script>
    // --- 完整扩充题库 (共24种) ---
    const masterChemicalDB = [
        // 易制毒 / 剧毒类
        { name: "三氯甲烷(氯仿)", type: "toxic", hint: "二类易制毒", desc: "【二类易制毒】。具麻醉性。应存放在【毒麻/易制毒柜】。", icon: "😷" },
        { name: "丙烯酰胺", type: "toxic", hint: "神经毒素", desc: "强神经毒素。应存放于【毒麻/易制毒柜】。", icon: "🧱" },
        { name: "DMSO", type: "toxic", hint: "极强渗透", desc: "能携带毒物透皮。应存放于【毒麻/易制毒柜】。", icon: "💧" },
        { name: "甲醛", type: "toxic", hint: "固定液", desc: "具毒性、致癌性。应存放于【毒麻/易制毒柜】。", icon: "🫙" },
        { name: "苯甲基磺酰氟(PMSF)", type: "toxic", hint: "蛋白酶抑制剂", desc: "【剧毒】。对呼吸道、皮肤有剧烈破坏性。应存放于【毒麻/易制毒柜】。", icon: "☠️" },
        
        // 强酸类
        { name: "浓硫酸", type: "acid", hint: "三类易制毒/强酸", desc: "【三类易制毒】。强腐蚀。必须存放于【强酸防腐蚀柜】，严禁与碱混放。", icon: "🔥" },
        { name: "盐酸", type: "acid", hint: "三类易制毒/强酸", desc: "【三类易制毒】。挥发性强。必须存放于【强酸防腐蚀柜】，严禁与碱及次氯酸钠混放。", icon: "🧪" },
        { name: "浓硝酸", type: "acid", hint: "氧化性强酸", desc: "具强氧化性及腐蚀性。应存放于【强酸防腐蚀柜】。严禁接触有机物。", icon: "💨" },
        { name: "三氯乙酸", type: "acid", hint: "有机强酸", desc: "具高腐蚀性。应存放于【强酸防腐蚀柜】。", icon: "☢️" },

        // 强碱类
        { name: "氢氧化钠", type: "base", hint: "强碱/烧碱", desc: "强腐蚀性碱。应存放于【强碱防腐蚀柜】，酸碱必须物理隔离存储。", icon: "⚪" },
        { name: "氢氧化钾", type: "base", hint: "强碱", desc: "极强腐蚀性。应存放于【强碱防腐蚀柜】。", icon: "⚪" },
        { name: "氨水", type: "base", hint: "挥发性碱", desc: "挥发性强。应存放于【强碱防腐蚀柜】并加强通风。", icon: "💨" },
        
        // 易燃类 (含染液)
        { name: "乙醚", type: "flammable", hint: "二类易制毒", desc: "【二类易制毒】。极易燃。应存放在【易燃防爆柜】。", icon: "🌫️" },
        { name: "丙酮", type: "flammable", hint: "三类易制毒", desc: "【三类易制毒】。极易燃。应存放于【易燃防爆柜】。", icon: "🛢️" },
        { name: "甲苯", type: "flammable", hint: "三类易制毒", desc: "【三类易制毒】。易燃。应存放于【易燃防爆柜】。", icon: "🧪" },
        { name: "无水乙醇", type: "flammable", hint: "高纯酒精", desc: "极易燃。应存放于【易燃防爆柜】。", icon: "🍾" },
        { name: "二甲苯", type: "flammable", hint: "脱蜡剂", desc: "易燃，蒸汽有害。应存放于【易燃防爆柜】。", icon: "🌫️" },
        { name: "吉姆萨(Giemsa)染液", type: "flammable", hint: "染色体/血液涂片", desc: "【易燃品】。通常以甲醇和甘油为溶剂，极易燃且具一定毒性。应存放于【易燃防爆柜】。", icon: "🩸" },
        { name: "苏木精-伊红(H&E)", type: "flammable", hint: "常规病理染色", desc: "【易燃品】。染色及分化脱水常使用大量高浓度乙醇/甲醇。应存放于【易燃防爆柜】。", icon: "🧫" },
        { name: "考马斯亮蓝染液", type: "flammable", hint: "蛋白凝胶染色", desc: "【易燃品】。染液与脱色液中含有大量甲醇、乙醇和冰乙酸，极易燃。应存放于【易燃防爆柜】。", icon: "🟦" },

        // 氧化/还原
        { name: "双氧水30%", type: "oxidizer", hint: "强氧化剂", desc: "强氧化性。应存放于【氧化剂专柜】。严禁混放易燃物。", icon: "💧" },
        { name: "次氯酸钠", type: "oxidizer", hint: "含氯氧化剂", desc: "氧化剂。应存放于【氧化剂专柜】。严禁接触盐酸。", icon: "🧼" },
        { name: "TEMED", type: "reducer", hint: "强还原剂", desc: "强还原剂。应存放于【还原剂专柜】。严禁接触氧化剂。", icon: "🐟" },
        { name: "β-巯基乙醇", type: "reducer", hint: "还原/臭", desc: "强还原，有毒。应存放于【还原剂专柜】。", icon: "🦨" }
    ];

    const cabinetDB = [
        { id: "flammable", name: "易燃防爆柜", bg: "#f1c40f" },
        { id: "oxidizer", name: "氧化剂专柜", bg: "#95a5a6" },
        { id: "reducer", name: "还原剂专柜", bg: "#8e44ad" },
        { id: "acid", name: "强酸防腐蚀柜", bg: "#3498db" },
        { id: "base", name: "强碱防腐蚀柜", bg: "#9b59b6" },
        { id: "toxic", name: "毒麻/易制毒柜", bg: "#e74c3c" }
    ];

    const adviceDB = {
        acid: "建议强化【强酸类】试剂的隔离存放意识，特别是盐酸与硝酸的强腐蚀与挥发性风险，严禁与碱类混放。",
        base: "建议复习【强碱类】试剂的管控标准，牢记酸碱必须严格进行物理隔离存储，防止中和放热反应。",
        flammable: "【易燃品】防爆意识有待提升，请着重复习极易燃溶剂及各类醇基染液（H&E、吉姆萨、考马斯亮蓝等）的管理规范。",
        oxidizer: "需加强【强氧化剂】（如双氧水、次氯酸钠）的学习，严禁将其与易燃物、还原剂混放，谨防爆炸。",
        reducer: "对【强还原剂】（如TEMED、β-巯基乙醇）的特性掌握不足，请注意其与氧化剂混放的自燃/爆炸风险。",
        toxic: "需牢记【毒麻/易制毒及剧毒品】（如氯仿、PMSF、丙烯酰胺等）的专柜保管制度及操作防护规范。"
    };

    // --- 核心全局变量 ---
    let stats = {}, encountered = {};
    let score = 0, lives = 2, queue = [], currentItem = null, timerInterval, timeLeft = 100;
    let isGameOver = false, isProcessing = false; 
    let totalRounds = 20, startTime, finalAdviceText = "";

    function initGame() {
        score = 0; lives = 2; isGameOver = false; isProcessing = false;
        stats = { flammable: 0, oxidizer: 0, reducer: 0, acid: 0, base: 0, toxic: 0 };
        encountered = { flammable: 0, oxidizer: 0, reducer: 0, acid: 0, base: 0, toxic: 0 };
        startTime = new Date();
        
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = "❤️❤️";
        
        renderCabinets();
        
        // 随机抽取20道题
        let fullPool = [...masterChemicalDB].sort(() => Math.random() - 0.5);
        queue = fullPool.slice(0, totalRounds);
        
        updateProgress();
        nextQuestion();
    }

    function renderCabinets() {
        const container = document.getElementById('cabinets');
        container.innerHTML = ''; 
        cabinetDB.forEach(cab => {
            const el = document.createElement('div');
            el.className = 'cabinet'; 
            el.style.backgroundColor = cab.bg;
            el.innerHTML = `<div class="cabinet-label">${cab.name}</div>`;
            el.onclick = () => tryPlace(cab.id, el);
            container.appendChild(el);
        });
    }

    function nextQuestion() {
        clearInterval(timerInterval);
        isProcessing = false; 
        
        if (queue.length === 0) return triggerGameOver(true);
        
        currentItem = queue.pop();
        encountered[currentItem.type]++; 
        updateProgress();
        
        document.getElementById('item-name').innerText = currentItem.name;
        document.getElementById('item-hint').innerText = currentItem.hint;
        document.getElementById('item-icon').innerText = currentItem.icon;
        
        timeLeft = 100;
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = '100%';
        timerBar.style.backgroundColor = 'var(--success-color)';
        
        timerInterval = setInterval(() => {
            if(isGameOver || isProcessing) return;
            
            // 15秒倒计时逻辑：100% / 150(次) ≈ 0.667% (每100ms扣除)
            timeLeft -= 0.667; 
            
            timerBar.style.width = Math.max(0, timeLeft) + '%';
            if (timeLeft < 30) timerBar.style.backgroundColor = 'var(--danger-color)';
            
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                isProcessing = true; 
                handleMistake(null, "未在规定时间内进行入库操作，该试剂已计入违规。"); 
            }
        }, 100);
    }

    function updateProgress() {
        document.getElementById('progress').innerText = `${totalRounds - queue.length}/${totalRounds}`;
    }

    function tryPlace(cabinetId, el) {
        if (!currentItem || isGameOver || isProcessing) return; 
        
        isProcessing = true; 
        clearInterval(timerInterval);
        
        if (currentItem.type === cabinetId) {
            score += 10; 
            stats[currentItem.type]++; 
            document.getElementById('score').innerText = score;
            showToast("✅ 分类正确！+10分");
            setTimeout(nextQuestion, 400); 
        } else {
            const isFatal = (currentItem.type === 'acid' && cabinetId === 'base') || 
                            (currentItem.type === 'base' && cabinetId === 'acid') ||
                            (currentItem.type === 'oxidizer' && (cabinetId === 'flammable' || cabinetId === 'reducer')) ||
                            (currentItem.type === 'reducer' && cabinetId === 'oxidizer');
                            
            let msg = `<b>判定错误：</b>【${currentItem.name}】不能存放在此区域。<br><br><b>解析：</b>${currentItem.desc}`;
            
            if (isFatal) {
                msg = `<span style="color:red;font-weight:bold;font-size:16px;">🔥 触发严重隐患：</span><br>严禁将酸碱或氧化/还原剂进行混放！这极易引起放热、爆炸及产生毒气。<br><br><b>规范解析：</b>${currentItem.desc}`;
                triggerGameOver(false, msg);
            } else {
                handleMistake(el, msg);
            }
        }
    }

    function handleMistake(el, msg) {
        lives--; 
        document.getElementById('lives').innerText = '❤️'.repeat(Math.max(0, lives));
        if (el) el.classList.add('shake');
        
        setTimeout(() => { 
            if(el) el.classList.remove('shake'); 
        }, 400);
        
        if (lives < 0) { 
            triggerGameOver(false, msg); 
        } else {
            showModal("操作违规警示", msg);
        }
    }

    function showToast(txt) {
        const t = document.getElementById('toast'); 
        t.innerText = txt; 
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 900);
    }

    function showModal(title, body) {
        document.getElementById('modal-title').innerHTML = title;
        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('share-btn').style.display = 'none';
        
        const btn = document.getElementById('modal-btn');
        btn.innerText = "知晓并继续";
        btn.onclick = closeModal;
    }

    function closeModal() { 
        document.getElementById('modal').style.display = 'none'; 
        if (!isGameOver) nextQuestion(); 
    }

    function triggerGameOver(win, msg) {
        isGameOver = true; 
        clearInterval(timerInterval);
        
        let lowestRate = 1.1; 
        let worstCat = "";
        
        for (let cat in encountered) {
            if (encountered[cat] > 0) {
                let rate = stats[cat] / encountered[cat];
                if (rate < lowestRate) {
                    lowestRate = rate;
                    worstCat = cat;
                }
            }
        }

        let adviceHtml = "";
        if (lowestRate < 1.0 && worstCat) {
            finalAdviceText = adviceDB[worstCat] || "建议全面复习实验室危化品管理章程。";
            adviceHtml = `<div class="advice-panel advice-warning"><b>💡 专属提升建议：</b><br>${finalAdviceText}</div>`;
        } else {
            finalAdviceText = "各项安全管控标准掌握极其扎实，无可挑剔！";
            adviceHtml = `<div class="advice-panel advice-success"><b>🏆 完美表现：</b><br>${finalAdviceText}</div>`;
        }

        const title = win ? "考核通过 ✅" : "考核终止 ❌";
        const content = (win ? `恭喜！你顺利完成了全套危化品分类考核。<br><br><b>最终评估得分：${score} 分</b>` : msg) + adviceHtml;
        
        document.getElementById('modal-title').innerHTML = title;
        document.getElementById('modal-body').innerHTML = content;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('share-btn').style.display = 'block';
        
        const btn = document.getElementById('modal-btn');
        btn.innerText = "重新参加考核";
        btn.onclick = () => location.reload();
    }

    function shareResult() {
        try {
            const now = new Date();
            const duration = Math.floor((now - startTime) / 1000);
            const status = lives >= 0 ? "合格 (Safe)" : "不合格 (Hazard)";
            
            let bestCat = "";
            let maxRate = -1;
            const catNames = { acid: "强酸防腐隔离", base: "强碱防腐隔离", flammable: "易燃品规范管理", oxidizer: "强氧化剂管控", reducer: "强还原剂管理", toxic: "毒麻/易制毒管控" };
            
            for (let cat in stats) {
                if (encountered[cat] > 0) {
                    let rate = stats[cat] / encountered[cat];
                    if (rate > maxRate) { maxRate = rate; bestCat = catNames[cat]; }
                }
            }

            let honor = maxRate >= 1 ? `【${bestCat}大师】` : `【安全防线守卫者】`;
            if (!bestCat) { bestCat = "暂无数据"; honor = "【见习安全员】"; maxRate = 0; }
            
            const shareText = `【实验室安全考核：专属动态战报】\n日期：${now.toLocaleDateString()}\n考核状态：${status}\n最终得分：${score}分\n用时：${duration}秒\n强项：最擅长[${bestCat}]，正确率达${Math.round(maxRate*100)}%！\n称号：${honor}\n\n诊断建议：\n${finalAdviceText}\n\n已掌握易制毒分级及高危试剂存放规范，快来挑战！`;
            
            executeFallback(shareText); 
        } catch(e) {
            alert("生成战报时发生异常，请检查浏览器设置。");
        }
    }

    function executeFallback(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "-9999px";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            const successful = document.execCommand('copy');
            if (successful) {
                alert("战报已成功复制！\n快去微信班级群或朋友圈粘贴打卡吧。");
            } else {
                throw new Error("Copy command rejected");
            }
        } catch (err) {
            alert("由于浏览器限制复制失败，请手动长按下方文本复制：\n\n" + text);
        } finally {
            document.body.removeChild(textArea);
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
