<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实验室安全：危化品入库考核</title>
    <style>
        :root { 
            --primary-color: #1a252f; 
            --bg-color: #ecf0f1; 
            --danger-color: #c0392b; 
            --success-color: #27ae60;
            --warning-color: #f39c12;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none; 
        }
        
        .header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            font-size: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            z-index: 10; 
        }
        
        .question-stage { 
            padding: 20px; 
            background: #fff; 
            border-bottom: 3px solid #bdc3c7; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 140px; 
            position: relative;
        }
        
        .current-item {
            background-color: #fff;
            border: 3px solid var(--primary-color);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transform: scale(1);
            transition: all 0.2s;
            max-width: 80%;
        }
        
        .item-icon { font-size: 40px; margin-bottom: 8px; }
        .item-name { font-size: 18px; font-weight: bold; color: #2c3e50; line-height: 1.3; }
        .item-hint { font-size: 12px; color: #7f8c8d; margin-top: 5px; }

        .timer-bar-container {
            width: 80%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background-color: var(--success-color);
            transition: width 0.1s linear;
        }

        .cabinets-container { 
            flex: 1; 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            overflow-y: auto; 
            padding-bottom: 40px; 
        }
        
        .cabinet { 
            border-radius: 8px; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            border: 3px solid rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 80px; 
            position: relative; 
        }
        .cabinet:active { transform: scale(0.95); }
        .cabinet-label { font-size: 14px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        
        .shake { animation: shake 0.4s; }
        .fatal-flash { animation: fatalFlash 0.6s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes fatalFlash { 0%, 100% { background-color: rgba(0,0,0,0.85); } 50% { background-color: rgba(192,57,43,0.9); } }
        
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 15px 25px; border-radius: 8px; display: none; z-index: 2000; }
    </style>
</head>
<body>
    <div class="header">
        <div>得分: <span id="score">0</span></div>
        <div>进度: <span id="progress">0/0</span></div>
        <div>生命: <span id="lives">❤️❤️</span></div>
    </div>
    
    <div class="question-stage" id="stage">
        <div class="current-item" id="current-item">
            <div class="item-icon" id="item-icon">❓</div>
            <div class="item-name" id="item-name">准备中...</div>
            <div class="item-hint" id="item-hint"></div>
        </div>
        <div class="timer-bar-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>
    </div>

    <div class="cabinets-container" id="cabinets"></div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">提示</h3>
            <div id="modal-body" style="font-size:14px; line-height:1.5; margin-bottom:20px; text-align: left;"></div>
            <button class="btn btn-primary" id="modal-btn" onclick="closeModal()">确认</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
    // --- 基于Excel文件的 24 种试剂全量库 ---
    const masterChemicalDB = [
        // 1. 易燃类 (Flammable)
        { name: "二甲苯", type: "flammable", hint: "病理切片脱蜡剂", desc: "易燃液体，蒸汽有毒且具致癌风险，必须存放于防爆柜。", icon: "🌫️" },
        { name: "甲醇", type: "flammable", hint: "脱水剂/溶剂", desc: "易燃、剧毒，可致盲。存放于易燃品防爆柜。", icon: "☠️" },
        { name: "无水乙醇", type: "flammable", hint: "常规溶剂", desc: "高纯度酒精，极易燃。远离火源存放于防爆柜。", icon: "🍾" },
        { name: "异丙醇", type: "flammable", hint: "核酸沉淀常用", desc: "易燃液体，具有刺激性，需存放于易燃防爆柜。", icon: "🧪" },
        { name: "丙酮", type: "flammable", hint: "器皿清洗/脱水剂", desc: "极易燃，挥发性强，蒸汽易爆。存放于防爆柜。", icon: "🛢️" },
        { name: "冰乙酸", type: "flammable", hint: "凝固性乙酸", desc: "虽然是酸，但其闪点低，属于易燃液体，且具腐蚀性。", icon: "🧊" },

        // 2. 氧化类 (Oxidizer)
        { name: "30%双氧水", type: "oxidizer", hint: "过氧化氢溶液", desc: "强氧化剂，受热或遇杂质易分解爆炸。存放于氧化柜。", icon: "💧" },
        { name: "浓硝酸", type: "oxidizer", hint: "发烟硝酸", desc: "强酸且具强氧化性，与有机物接触易燃。隔离存放。", icon: "💨" },
        { name: "次氯酸钠", type: "oxidizer", hint: "漂白水/消毒剂", desc: "氧化剂。切忌与盐酸混放（会产生毒氯气）。", icon: "🧼" },

        // 3. 腐蚀类 (Corrosive)
        { name: "氢氧化钾", type: "corrosive", hint: "强碱", desc: "极强腐蚀性，易潮解。存放在防腐蚀柜。", icon: "⚪" },
        { name: "氢氧化钠", type: "corrosive", hint: "火碱/烧碱", desc: "极强腐蚀性，对人体组织有破坏作用。存放在腐蚀柜。", icon: "⚪" },
        { name: "三氯乙酸", type: "corrosive", hint: "TCA/蛋白沉淀剂", desc: "强腐蚀性有机酸。存放在酸碱腐蚀柜。", icon: "☢️" },
        { name: "甲醛", type: "corrosive", hint: "固定液", desc: "刺激性气味，致癌物。存放于通风良好的腐蚀柜。", icon: "🫙" },
        { name: "多聚甲醛", type: "corrosive", hint: "PFA", desc: "分解释放甲醛气体，具毒性与腐蚀性。", icon: "❄️" },
        { name: "戊二醛", type: "corrosive", hint: "电镜固定液", desc: "对眼睛及呼吸道有强刺激。存放在腐蚀柜。", icon: "🔬" },
        { name: "盐酸", type: "corrosive", hint: "挥发性强酸", desc: "强腐蚀性，酸雾具刺激性。存放于腐蚀柜。", icon: "🧪" },
        { name: "福尔马林", type: "corrosive", hint: "甲醛溶液", desc: "强腐蚀、强刺激。存放在专用腐蚀柜。", icon: "🫙" },
        { name: "浓硫酸", type: "corrosive", hint: "脱水强酸", desc: "强腐蚀且遇水剧烈放热。严格存放在防腐蚀柜。", icon: "🔥" },
        { name: "氨水", type: "corrosive", hint: "碱性/刺激性", desc: "挥发性极强，具腐蚀性和毒性。存放于通风腐蚀柜。", icon: "💨" },

        // 4. 毒害/管控类 (Toxic)
        { name: "氯仿", type: "toxic", hint: "三氯甲烷/易制毒", desc: "具麻醉性、致癌性，易分解产生光气。双人双锁管理。", icon: "😷" },
        { name: "丙烯酰胺", type: "toxic", hint: "电泳制胶", desc: "强神经毒素，具累积毒性。必须存放于毒品柜。", icon: "🧱" },
        { name: "DMSO", type: "toxic", hint: "二甲基亚砜", desc: "透皮吸收极强，能携带毒物入体。妥善存放于试剂柜。", icon: "💧" },

        // 5. 还原类 (Reducer)
        { name: "TEMED", type: "reducer", hint: "四甲基乙二胺", desc: "强还原剂，助促凝。严禁与氧化剂混放，具恶臭。", icon: "🐟" },
        { name: "β-巯基乙醇", type: "reducer", hint: "蛋白变性剂", desc: "极强还原性，有恶臭毒性。存放在通风试剂柜。", icon: "🦨" }
    ];

    const cabinetDB = [
        { id: "flammable", name: "易燃防爆柜", bg: "#f1c40f" },
        { id: "oxidizer", name: "氧化剂专柜", bg: "#95a5a6" },
        { id: "reducer", name: "还原剂专柜", bg: "#8e44ad" },
        { id: "corrosive", name: "强酸碱腐蚀柜", bg: "#3498db" },
        { id: "toxic", name: "毒麻/易制毒柜", bg: "#e74c3c" }
    ];

    let score = 0;
    let lives = 2;
    let queue = [];
    let currentItem = null;
    let timerInterval;
    let timeLeft = 100;
    let totalQuestions = 0; 
    let isGameOver = false;

    function initGame() {
        score = 0;
        lives = 2;
        isGameOver = false;
        document.getElementById('score').innerText = score;
        renderCabinets();
        queue = [...masterChemicalDB].sort(() => Math.random() - 0.5);
        totalQuestions = queue.length; 
        updateProgress();
        nextQuestion();
    }

    function renderCabinets() {
        const container = document.getElementById('cabinets');
        container.innerHTML = ''; 
        cabinetDB.forEach(cab => {
            const el = document.createElement('div');
            el.className = 'cabinet';
            el.style.backgroundColor = cab.bg;
            el.innerHTML = `<div class="cabinet-label">${cab.name}</div>`;
            el.onclick = () => tryPlace(cab.id, el);
            container.appendChild(el);
        });
    }

    function nextQuestion() {
        clearInterval(timerInterval);
        if (queue.length === 0) {
            triggerGameOver(true);
            return;
        }
        currentItem = queue.pop();
        updateProgress();
        document.getElementById('item-name').innerText = currentItem.name;
        document.getElementById('item-hint').innerText = currentItem.hint;
        document.getElementById('item-icon').innerText = currentItem.icon;
        
        timeLeft = 100;
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = '100%';
        
        timerInterval = setInterval(() => {
            if(isGameOver) return;
            timeLeft -= 1.2; // 约8秒一题
            timerBar.style.width = timeLeft + '%';
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleMistake(null, "操作超时！未及时入库。");
            }
        }, 100);
    }

    function updateProgress() {
        document.getElementById('progress').innerText = `${totalQuestions - queue.length}/${totalQuestions}`;
    }

    function tryPlace(cabinetId, el) {
        if (!currentItem || isGameOver) return;
        clearInterval(timerInterval);
        
        if (currentItem.type === cabinetId) {
            score += 10;
            document.getElementById('score').innerText = score;
            showToast("正确！+10");
            setTimeout(nextQuestion, 400);
        } else {
            // 判定是否属于爆炸性混放 (氧化+还原/易燃)
            const isFatal = (currentItem.type === 'oxidizer' && (cabinetId === 'flammable' || cabinetId === 'reducer')) ||
                            (currentItem.type === 'reducer' && cabinetId === 'oxidizer');
            
            let msg = `【${currentItem.name}】放错位置了！<br><br><b>解析：</b>${currentItem.desc}`;
            if (isFatal) {
                msg = `<span style="color:red;font-weight:bold">🔥 严重事故：</span>氧化剂与还原剂/易燃物混放引发爆炸！<br><br>评估不合格。`;
                triggerGameOver(false, msg, true);
            } else {
                handleMistake(el, msg);
            }
        }
    }

    function handleMistake(el, msg) {
        lives--;
        document.getElementById('lives').innerText = '❤️'.repeat(lives);
        if (el) el.classList.add('shake');
        setTimeout(() => { if(el) el.classList.remove('shake'); }, 400);
        
        if (lives <= 0) {
            triggerGameOver(false, msg, false);
        } else {
            showModal("操作违规", msg);
        }
    }

    function showToast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 800);
    }

    function showModal(title, body) {
        document.getElementById('modal-title').innerHTML = title;
        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        if (!isGameOver) nextQuestion();
    }

    function triggerGameOver(win, msg, fatal) {
        isGameOver = true;
        clearInterval(timerInterval);
        const title = win ? "考核通过" : "考核失败";
        const finalMsg = win ? `恭喜！你已完成全部 ${totalQuestions} 种试剂的分类。` : msg;
        if (fatal) document.getElementById('modal').classList.add('fatal-flash');
        
        showModal(title, finalMsg);
        const btn = document.getElementById('modal-btn');
        btn.innerText = "重新开始";
        btn.onclick = () => location.reload();
    }

    window.onload = initGame;
</script>
</body>
</html>
